<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Calculadora Simples Com crud</title>
    <link rel="stylesheet" href="style.css">
    <script src="crud.js"></script>
    <script src="main.js"></script>

</head>

<body>
    <H1>Calculadora</H1>

    <input type="Number" id="N1" placeholder="1º numeral">
    <input type="Number" id="N2" placeholder="2º numeral">

    <div class="botoes">
        <button onclick="somar()">+</button>
        <button onclick="subtrair()">−</button>
        <button onclick="multiplicar()">×</button>
        <button onclick="dividir()">÷</button>
    </div>
    <h2 id="resultado">Resultado: </h2>

    <script src="crud.js"></script>
    <script src="main.js"></script>
</body>

</html>
